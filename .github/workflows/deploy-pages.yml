name: GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'index.html'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.22.2'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Prepare Pages artifact
        run: |
          if [ -f dist/qw-jwt-debugger.html ]; then
            mv dist/qw-jwt-debugger.html dist/index.html
          else
            echo "Error: dist/qw-jwt-debugger.html not found"
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
